<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Uma Pergunta Especial ❤️</title>

<style>
    body {
        font-family: 'Arial', sans-serif;
        background: linear-gradient(135deg, #ff758c, #ff7eb3);
        text-align: center;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
    }

    .container {
        background: white;
        padding: 50px;
        border-radius: 20px;
        box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        position: relative;
        width: 350px;
        height: 250px;
    }

    h1 {
        margin-bottom: 20px;
        color: #ff4d6d;
    }

    button {
        padding: 12px 30px;
        margin: 10px;
        font-size: 18px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        position: absolute;
    }

    #sim {
        background-color: #ff4d6d;
        color: white;
        bottom: 20px;
        left: 50px;
    }

    #nao {
        background-color: #999;
        color: white;
        bottom: 20px;
        right: 50px;
    }

    #mensagem {
        margin-top: 20px;
        font-size: 22px;
        color: #ff4d6d;
        display: none;
    }
</style>

</head>
<body>

<div class="container" id="container">
    <h1>💖 Quer namorar comigo? 💖</h1>

    <button id="sim">SIM 😍</button>
    <button id="nao">NÃO 😢</button>

    <div id="mensagem">🥰 Sabia que você ia dizer sim! 💕</div>
</div>

<script>
    const btnNao = document.getElementById("nao");
    const btnSim = document.getElementById("sim");
    const container = document.getElementById("container");
    const mensagem = document.getElementById("mensagem");

    function moverBotao() {
        const largura = container.clientWidth - btnNao.offsetWidth;
        const altura = container.clientHeight - btnNao.offsetHeight;

        const x = Math.random() * largura;
        const y = Math.random() * altura;

        btnNao.style.left = x + "px";
        btnNao.style.top = y + "px";
    }

    btnNao.addEventListener("mouseover", moverBotao);
    btnNao.addEventListener("click", moverBotao);

    btnSim.addEventListener("click", () => {
        mensagem.style.display = "block";
    });
</script>

</body>
</html>
